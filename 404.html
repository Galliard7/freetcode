<!DOCTYPE html>
<html lang="en">
<!--
  FreetCode — 404 page.
  SPDX-License-Identifier: AGPL-3.0-or-later · Copyright (C) 2026 Galliard7.
  Cloudflare Pages serves this (with a 404 status) for any path that doesn't
  match a static asset. Its mere presence disables Pages' default single-page-app
  fallback (which otherwise served index.html with a 200 for unknown paths).
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — Page not found · FreetCode</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><text x='50' y='68' text-anchor='middle' font-size='50' font-weight='800' fill='white'>&lt;/&gt;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
<link rel="stylesheet" href="themes.css?v=2">
<script>
  (function(){
    var THEMES = ['refined-dark','brutalist','glassy','warm'];
    var t = localStorage.getItem('freetcode_theme');
    document.documentElement.dataset.theme = THEMES.indexOf(t) >= 0 ? t : 'refined-dark';
  })();
</script>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: var(--bg-base, #0b0d12); color: var(--fg-primary, #e6e9ef);
    font-family: var(--font-ui, 'Inter', system-ui, sans-serif); }
  .box { text-align: center; padding: 40px 24px; max-width: 460px; }
  .logo-mark { width: 44px; height: 44px; border-radius: 11px; margin: 0 auto 20px;
    background: var(--accent, #6366f1); color: #fff; display: grid; place-items: center;
    font-weight: 800; font-size: 20px; font-family: var(--font-mono, monospace); }
  .code { font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -1px;
    font-family: var(--font-mono, 'JetBrains Mono', monospace); }
  h1 { font-size: 20px; margin: 14px 0 8px; }
  p { color: var(--fg-muted, #8a93a6); font-size: 14px; line-height: 1.6; margin: 0 0 24px; }
  a.btn { display: inline-block; text-decoration: none; padding: 10px 18px; border-radius: 9px;
    background: var(--accent, #6366f1); color: #fff; font-weight: 600; font-size: 14px; }
  a.btn:hover { opacity: .92; }
  .alt { display: block; margin-top: 16px; font-size: 13px; }
  .alt a { color: var(--accent, #6366f1); text-decoration: none; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo-mark">&lt;/&gt;</div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist, or it moved. Let's get you back to solving problems.</p>
    <a class="btn" href="/">← Back to FreetCode</a>
    <span class="alt"><a href="/dashboard.html">View community stats →</a></span>
  </div>
</body>
</html>
