<!DOCTYPE html>
<!-- Source for assets/share-card.png (og:image / twitter:image, 1200x630).
     Regenerate: screenshot this file at 1200x630 (e.g. Playwright). -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0b0d12;
    font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #e6e9ef;
    position: relative;
  }
  .glow {
    position: absolute; width: 900px; height: 900px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, rgba(99,102,241,0) 65%);
    top: -320px; right: -260px;
  }
  .glow2 {
    position: absolute; width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, rgba(99,102,241,0) 60%);
    bottom: -360px; left: -200px;
  }
  .wrap { position: relative; padding: 72px 84px; height: 100%; display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 20px; }
  .mark {
    width: 72px; height: 72px; border-radius: 16px; background: #6366f1;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-weight: 800; font-size: 30px; color: #fff;
  }
  .name { font-size: 44px; font-weight: 800; letter-spacing: -0.5px; }
  .headline {
    margin-top: 64px; font-size: 74px; font-weight: 800; line-height: 1.08;
    letter-spacing: -2px; max-width: 980px;
  }
  .headline .accent { color: #818cf8; }
  .lists { margin-top: 36px; display: flex; gap: 14px; }
  .pill {
    padding: 10px 22px; border: 1.5px solid #2a3245; border-radius: 999px;
    font-size: 24px; font-weight: 600; color: #aab3c5; background: rgba(255,255,255,0.03);
  }
  .foot { margin-top: auto; display: flex; align-items: baseline; justify-content: space-between; }
  .tag { font-size: 28px; color: #8a93a6; font-weight: 500; }
  .url { font-size: 30px; font-weight: 700; color: #818cf8; font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="wrap">
    <div class="brand">
      <div class="mark">&lt;/&gt;</div>
      <div class="name">FreetCode</div>
    </div>
    <div class="headline"><span class="accent">Free</span> coding interview prep,<br>right in your browser.</div>
    <div class="lists">
      <div class="pill">Blind 75</div>
      <div class="pill">NeetCode 150</div>
      <div class="pill">Grind 75</div>
      <div class="pill">Top 150</div>
    </div>
    <div class="foot">
      <div class="tag">No login&ensp;·&ensp;No paywall&ensp;·&ensp;Open source</div>
      <div class="url">freetcode.com</div>
    </div>
  </div>
</body>
</html>
